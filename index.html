<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE FIRE OFFICIAL - Deepak Meena</title>
    <style>
        :root { --primary: #ff9900; --dark: #0b0e14; --card: #1c2128; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--dark); color: white; text-align: center; }
        header { background: linear-gradient(to bottom, #1a2a6c, #0b0e14); padding: 40px 20px; border-bottom: 2px solid var(--primary); position: relative; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 15px; }
        .scam-alert { color: var(--primary); font-weight: bold; margin: 20px; text-transform: uppercase; font-size: 0.9rem; }
        
        .store-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .id-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; text-align: left; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .id-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .id-card h3 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .price { font-size: 1.8rem; font-weight: bold; color: #2ecc71; margin-top: 15px; }
        
        .btn-yt { background: #ff0000; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; border: 2px solid white; transition: 0.3s; }
        .btn-yt:hover { transform: scale(1.1); box-shadow: 0 0 15px #ff0000; }
        
        .btn-buy { background: #25D366; color: white; padding: 12px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; font-weight: bold; }

        #admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .admin-box { background: #161b22; width: 90%; max-width: 450px; margin: 0 auto; padding: 30px; border-radius: 15px; border: 1px solid var(--primary); box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .admin-btn { background: #2ecc71; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .lock-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button class="lock-btn" onclick="askPassword()">🔒 ADMIN</button>
        <img src="logo.jpg" alt="Logo" class="logo">
        <h1>FREE FIRE OFFICIAL</h1>
        <div class="scam-alert">DIRECT SELLER: DEEPAK MEENA | RAJASTHAN</div>
        <a id="yt-link" href="#" target="_blank" class="btn-yt">🔴 SUBSCRIBE MY CHANNEL</a>
    </header>

    <section style="padding: 20px;">
        <h2 style="letter-spacing: 2px;">ID STORE - <span style="color:var(--primary)">LIVE ACCOUNTS</span></h2>
        <div class="store-container" id="id-display"></div>
    </section>

    <!-- Admin Panel -->
    <div id="admin-overlay">
        <div class="admin-box">
            <h2 id="panel-title">Security Check</h2>
            <div id="pass-section">
                <input type="password" id="entry-pass" placeholder="Password Dalein (9075)">
                <button class="admin-btn" onclick="checkPass()">LOGIN</button>
            </div>

            <div id="control-section" style="display:none;">
                <h3 style="color:var(--primary)">YouTube Channel Settings</h3>
                <input type="text" id="new-yt-url" placeholder="Apna YouTube Link Paste Karein">
                <button class="admin-btn" style="background:#3498db" onclick="updateYT()">Update YouTube Link</button>
                <hr style="border: 0.5px solid #333; margin: 20px 0;">
                <h3 style="color:var(--primary)">Add New ID</h3>
                <input type="text" id="id-name" placeholder="ID Title">
                <input type="text" id="id-level" placeholder="Level">
                <input type="text" id="id-price" placeholder="Price (e.g. ₹500)">
                <textarea id="id-desc" rows="3" placeholder="Evo Guns, Bundles, etc."></textarea>
                <button class="admin-btn" onclick="addNewID()">ADD TO STORE</button>
                <button class="admin-btn" style="background:#e74c3c" onclick="clearStore()">DELETE ALL IDS</button>
            </div>
            <button class="admin-btn" style="background:#444; margin-top:20px;" onclick="closeAdmin()">CLOSE</button>
        </div>
    </div>

    <script>
        let ids = JSON.parse(localStorage.getItem('ff_pro_data')) || [];
        let ytUrl = localStorage.getItem('ff_yt_url') || 'https://youtube.com';

        function askPassword() { document.getElementById('admin-overlay').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

        function checkPass() {
            if(document.getElementById('entry-pass').value === '9075') {
                document.getElementById('pass-section').style.display = 'none';
                document.getElementById('control-section').style.display = 'block';
                document.getElementById('panel-title').innerText = 'Admin Access Granted';
            } else { alert("Wrong Password!"); }
        }

        function updateYT() {
            const url = document.getElementById('new-yt-url').value;
            if(url) {
                localStorage.setItem('ff_yt_url', url);
                ytUrl = url;
                document.getElementById('yt-link').href = url;
                alert("YouTube Link Update Ho Gaya!");
            }
        }

        function addNewID() {
            const name = document.getElementById('id-name').value;
            const level = document.getElementById('id-level').value;
            const price = document.getElementById('id-price').value;
            const desc = document.getElementById('id-desc').value;
            if(!name || !price) return alert("Fill Name and Price!");
            ids.push({ name, level, price, desc });
            localStorage.setItem('ff_pro_data', JSON.stringify(ids));
            renderStore();
            alert("ID Added!");
        }

        function renderStore() {
            document.getElementById('yt-link').href = ytUrl;
            const display = document.getElementById('id-display');
            if(ids.length === 0) { display.innerHTML = "<p>No IDs available.</p>"; return; }
            display.innerHTML = ids.slice().reverse().map(item => {
                const waMessage = window.encodeURIComponent(`Hello Deepak Bhai, mujhe ye ID kharidni hai:\n\n📌 ID: ${item.name}\n💰 Price: ${item.price}`);
                return `
                <div class="id-card">
                    <h3>${item.name}</h3>
                    <p><b>⭐ Level:</b> ${item.level}</p>
                    <p><b>🔥 Details:</b> ${item.desc}</p>
                    <div class="price">${item.price}</div>
                    <a href="https://wa.me/918871196403?text=${waMessage}" target="_blank" class="btn-buy">KHARIDEIN (WhatsApp)</a>
                </div>`;
            }).join('');
        }

        function clearStore() { if(confirm("Delete All?")) { localStorage.removeItem('ff_pro_data'); ids = []; renderStore(); } }

        renderStore();
    </script>
</body>
</html>
